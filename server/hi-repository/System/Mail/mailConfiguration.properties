#This configuration file is used to send e-mails with attachments

# The address of the SMTP server.
hostName=

# The connection port. 587 is standard for STARTTLS (secure). 465 is for Implicit SSL.
port=587

# The default "Sender" email address that will appear in the "From" field of the recipient's inbox.
from=

# When true, the server requires a username and password to send mail. Gmail always requires this.
isAuthenticated=no

# When true, it uses Implicit SSL (usually port 465). Since you are using port 587, this should be false (STARTTLS is handled by ttlsEnabled instead).
isSSLEnabled=yes
# The email account used to log in
user=

# The password or App Password for the user. (For Gmail, a 16-character App Password is required).
password=


subject=Report Name:
body=NOTICE: This email is generated by Helical Insight Application. This email and any attachments may contain confidential and proprietary information and is for the sole use of the intended recipient for the stated purpose. If you are not the intended recipient, please notify the sender.

# The transport protocol. Usually smtp or smtps
mailProtocol=smtp

# When true, prints the full SMTP "handshake" to the console
debug=false
# Specifies the specific security protocol. TLSv1.2 or TLSv1.3 are recommended for modern security.
sslProtocols=TLSv1.2

# Enables the STARTTLS command. This upgrades an insecure connection to a secure one on port 587.
ttlsEnabled=true 

# If true, the mail will fail to send if the server doesn't support a secure TLS connection.
ttlsRequired=true

# If true, the socket is kept open between transmissions to improve performance.
keepAlive=true

# If true, the application waits for the server to acknowledge the QUIT command before closing the socket.
quitWait=false

#poolConfig
# The minimum number of connections to keep alive in the pool at all times, even if no one is sending mail.
minIdle=5
# The maximum number of connections that can sit unused in the pool. Excess connections are closed.
maxIdle=10

# The absolute limit of simultaneous connections. If this is 25, the 26th connection trying to send a mail must wait.
maxTotal=25

# How long (in milliseconds) a thread will wait for a connection to become available before throwing an error (e.g., 10 seconds).
maxWaitMillis=10000

# The minimum time a connection can sit idle before it becomes "eligible" for being closed and removed from the pool.
minEvictableIdleTimeMillis=5

# How often the "cleaner" thread runs to scan for idle connections that need to be closed (e.g., every 10 seconds).
timeBetweenEvictionRunsMillis=10000

# If true, the pool "pings" the SMTP server before giving a connection. Highly recommended to prevent "Stale Connection" errors.
setTestOnBorrow=true


