# Adhoc query builder default size of data limit
adhoc.query.default.size=FULL

################################################################
# Security Rule Definitions(For Adhoc Reports for Columns, this will not work for tables)
#
# default - this level of security is as good as no-security
#
# stripped - this will remove the given property and the program will run normally,
#            1)incase of filter, it removes value which contains the sql, if found the value is stripped.
#            2)incase of column, it removes for custom columns and association.
# strict-metadata - The defined property is compared with metadata, if the match is not found it will stop and throw and error
#                    1)incase of custom columns, the columns will be checked in metadata, if the column name is not found in metadata, then throws an exception
#                   2)incase of filter value, the value is checked for sql,if sql is found then it will stop and throw an error.
# strict - this level of security,if the rule detects in the jsonobject it will stop and throw and exception
#
# sql-detect - this rule will use the sqlpattern property to detect sql and throws error incase if sql is detected
#
# How to use security rules
#   to find the path in the json it should begin with $ sign which represents the root of the json documents, the starting element
#   followed by dot(.) and key e.g "$.location"
#   incase of nested json document the jsonpath needs to be constructed as "$.metadataFileJson.connectionDetails.connectionType"
#   incase of json array`s the json path needs to be constructed as below
#   $.columns[*]
#   incase if you want to access an array element then define the rule as follows
#   $.columns[*].column
#   incase if you are unsure the location of the key then the jsonpath can be constructed as
#   $..columns
#   incase if you want to filter out specific column then jsonpath will be defined as follows
#   $.columns[?(@['custom'])] - this will check only for columns
################################################################

#adhoc.security.mode=true
#adhoc.security.formData.location=stripped
#adhoc.security.formData.columns.column = stripped

#this only checks for custom columns
$.columns[?(@['custom'])] = strict-metadata
#this is for filters
$.filters[*].values[*] = strict-metadata
#To check custom value in filters
#$.filters[*].isCustomValue=strict
#$.filters[?(@.customCondition)]=strict
#To check for filter expression, other rules are not applicable except sql-detect
$.customFilterExpression = sql-detect
#to check for having expression, other rules are not applicable except sql-detect
$.customHavingExpression = sql-detect


#this property is to allow for complex json queries, this is used incase of json queries for example drill, please change the property to default when trying to use other queries apart from json
#allow_complex_json_queries = to enable execute complex json queries
#default =  to disable execution of json complex queries
strict-metadata-object = default



#Enable the below property to enable security in EFW Reports
$.@name=sql-detect
#to check for default values
#$.@default=default


#regex pattern to check for sql keywords in value
sqlpattern = (?i)(ALTER|CREATE|DELETE|DROP|EXEC(UTE){0,1}|INSERT( +INTO){0,1}|MERGE|SELECT|UPDATE|UNION( +ALL){0,1}|FROM|WHERE|SLEEP|;)

#
#this will stop, if custom value is present
#$.filters[?(@.isCustomValue)].values[*]=strict;
#



#any expression having sql we should stripped


#Enable the value to true and converts the empty filter to _all_. This works for the collection  filters.
adhoc.query.useDefaults=true
adhoc.query.filter.emptyInClauseValue=['_all_']
adhoc.query.filter.customExpressionReplaceValue=('_all_' = '_all_')

# Adhoc metadata fetching related inforamtion(For tables and views)
adhoc.metadata.fetch=TABLE,VIEW

# Regex fragments used by SqlQueryMetadataValidator.containsIdentifier to match standalone SQL identifiers.
# The identifier itself is inserted between prefix and suffix at runtime.
sql.query.identifier.regex.prefix=(?<![A-Za-z0-9_])[\"\`\\[]?
sql.query.identifier.regex.suffix=[\"\`\\]]?(?![A-Za-z0-9_])

# Regex matching the quote characters (double quotes, back-ticks, square brackets) that wrap SQL
# identifiers. Used by DerivedTableViewReplacer to strip quotes from table/view names.
sql.query.identifier.quote.regex=[\"\`\\[\\]]