    <script>
        const elementId = 'jwt';

        // function unMountRootComponent(elementId) {
        //     const rootElement = document.getElementById(elementId);
        //     if (rootElement) {
        //         ReactDOM.unmountComponentAtNode(rootElement);
        //     }
        // }
       var settings = {
  "url": "https://${host}:${port}/hi-ee/rest/authToken",
  "method": "POST",
  "timeout": 0,
  "headers": {
    "Content-Type": "application/json"
  },
  "data": JSON.stringify({
    "username": "hiadmin",
    "password": "hiadmin"
  }),
};


        function generateToken() {
		
            var token = new Promise((success, failure) => {
                $.ajax(settings).done(function (response) {
                    token = response.token;
                    success(token)
                }).fail(function (reason) {
                    console.log("failed", reason)
                });
            })
            return token
        }
        function callAjax(urlString, token, callback) {
            // token = 'Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJIZWxpY2FsSW5zaWdodCIsInN1YiI6ImhpdXNlciIsInNjb3BlcyI6IlJPTEVfQURNSU4sUk9MRV9VU0VSIiwiaWF0IjoxNjQxNTU4ODQyLCJleHAiOjE2NTk1NTg4NDJ9.Q445ReiSP_SFODTKJLVXZ9V5VgNVcveonneXzEykSJ0'
            $.ajax({
                method: "POST",
                url: urlString,
                contentType: "text/html",
                dataType: 'json',
                crossDomain: true,
                beforeSend: function (xhr, settings) {
                    if (token) {
                        xhr.setRequestHeader("type", 'jwt');
                        xhr.setRequestHeader("authToken", token);
                    }
                },
                success: function (data) {
                    callback(data)
                },
            })

        }

        function login(token) {
            //set cookies
            var loginData = new Promise((success, failure) => {
                callAjax(requestBaseUrl + "?authToken=" + encodeURI(token), encodeURI(token), data => {
                    success(data)
                });
            })
            return loginData
        }


        function logout() {
            //delete cookies
            callAjax(requestBaseUrl + "logout", "", function () {
                document.getElementById('reports').innerHTML = '';
                document.getElementById('reports').style.display = "none"
                document.getElementById('jwt').innerHTML = "";
                //unMountRootComponent(elementId);
                authToken = ""

            })
        }

        var authToken = ""

        function logIn() {
            generateToken().then(token => {
                authToken = token
                login(token).then((loginData) => {
                    // After successfully login, required functionality/code can be run here.
                })
            })
        }

        function openReportList() {
            //unMountRootComponent(elementId);
            //document.getElementById('jwt').innerHTML = "";
            var formData = ["efw", "hr"]
            var options = {
                extensions: btoa(JSON.stringify(formData)),
                v: new Date().getTime()
            }
            var url = requestBaseUrl + "getSolutionResources"
            url = url + "?extensions=" + options.extensions + "&v=" + options.v
            callAjax(url, authToken, function (data) {
                var items = []
                data.map(folder => {
                    items = items.concat(getChildren(folder))
                })
                $("#reports")[0].innerHTML = ""
                items.map(item => {
                    if (!item.title) {
                        return
                    }
                    var path = item.path
                    var name = item.name
                    var dir = item.path.replace(name, "").replace(/\/$/, "")
                    var div = document.createElement("div")
                    div.addEventListener("click", function () {
                        document.getElementById('reports').style.display = "none"
                        embed({
                            auth: { type: 'jwt', authToken },
                            report: {
                                dir, file: name,
                            },
                            elementId,
                            baseURL: requestBaseUrl
                        })
                        var reportCloser = document.createElement("div");
                        reportCloser.setAttribute("id", "report-closer");
                        reportCloser.addEventListener("click", function () {
                            document.getElementById('reports').style.display = "block";
							let parentNode = document.getElementById('jwt');
							let newParent = parentNode.cloneNode(false);
							parentNode.replaceWith(newParent);
                            //document.getElementById('jwt').innerHTML = "";
                           // unMountRootComponent(elementId);
                        });
                        reportCloser.innerHTML = 'X';
                        $("#jwt").append(reportCloser);
                        document.getElementById('report-closer').style.display = "block";
                    })
                    div.innerHTML = item.title
                    div.setAttribute("title", item.title + "(" + item.extension + ")")
                    div.setAttribute("class", "report-file")
                    $("#reports")[0].style.display = "block"
                    $("#reports").append(div)
                })
            })

        }
        function getChildren(folder) {
            var items = []
            if (folder.children && folder.children.length) {
                folder.children.map(folder => {
                    items = items.concat(getChildren(folder))
                })
                return items
            }
            return folder
        }

    </script>

    <div class="jwt-header">
        <button id="open-btn" onclick="openReportList()">Reports</button>
        <button id="login-btn" onclick="logIn()">Login</button>
        <button id="logout-btn" onclick="logout()">Log Out</button>
    </div>
    <div class="reports-list">
        <div id="reports">
        </div>
    </div>
    <div style="width: 100%;  float: left" id="jwt">
    </div>

    <style>
        #jwt {
            position: relative;
        }

        #report-closer {
            font-size: 22px;
            color: red;
            font-weight: 800;
            cursor: pointer;
            position: absolute;
            top: -10px;
            z-index: 1;
            right: 2.5px;
        }

        .jwt-header {
            float: right;
            padding: 5px 0px;
        }

        .jwt-header button {
            border-width: 1px;
            border-color: #ccc;
            background-color: #3c8bca;
            color: #fff;
            padding: 4px;
            border-radius: 6px;
        }

        .jwt-header button:hover {
            color: #3c8bca;
            background-color: #fff;
            border-color: #3c8bca;
        }

        .reports-list {
            position: relative;
        }

        .reports-list>div {
            width: 20%;
            display: none;
            position: absolute;
            right: 0px;
            top: 35px;
            height: 90vh;
            overflow: auto;
            border: 1px solid #ddd;
            background-color: #fff;
        }

        .report-file {
            cursor: pointer;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 2px;
            border-top: 1px solid #3c8bca;
        }

        .report-file:hover {
            background-color: #3c8bca;
            border-top: 1px solid #fff;
            color: #fff;
        }
    </style>

</body>
