# suppress inspection "UnusedProperty" for whole file
#Base configuration file for the application on the file system
schedulerPath=${hiRepositoryPath}/System/scheduling.xml
settingPath=${hiRepositoryPath}/System/Admin/setting.xml
#Location of the plugin directory
pluginPath=${hiRepositoryPath}/System/Plugins


#The null value to be used
nullValues=Null

#The Blank value
blankValues=_Blank_

#The proposed all values
allValues=_all_

#The type of the repository
type=xml
encryptionAlgorithm=AES
encryptionSecret=abcd@#$%+-_|1234

#cache File Settings
enableCache=true

#For managed data source sharing. If true then the data source which is cached will be returned, though some of its
#configurations are changed.
enableDataSourceSharing=true

#Number of threads is determined based on this value of tables
metadataThreadsTableThreshold=250

#HCR pool connection
hcr.generate_hcr_report_threshold=30
hcr.generate_hcr_report_thread.name.prefix=_HI_HCR_



#Thread pool size is determined based on this value for FileBrowserCache service
cache.file_browser_cache_threshold=25
cache.file_browser_search_threshold=25
cache.file_browser_search_pagination_threshold=100

#The number of pages for joins that will be provided to the frontend
cachedJoinsThreshold=5
#Supported loggers by the application
supportedLoggers=interface org.slf4j.Logger

#Injected Rules for non visible files
com.helicalinsight.efw.resourceloader.rules.efwvf=com.helicalinsight.efw.resourceloader.rules.impl.EFWVFRule
com.helicalinsight.efw.resourceloader.rules.efwScript=com.helicalinsight.efw.resourceloader.rules.impl.EFWScriptRule
com.helicalinsight.efw.resourceloader.rules.image=dummy.image.rule


#JWT constants:
access_token_validity_seconds=18000000
signing_key=Helical
token_prefix=Bearer\u0020
header_string=Authorization
header_string_type=type
header_string_type_sso=token
header_string_type_jwt=jwt
header_string_type_direct=direct
header_string_authToken=authToken
param_string=authToken
authorities_key=scopes
signing_algorithm = HS256
issuer = HelicalInsight
jwt_type = JWT
jwt_cookie=false
#TEST query change for database

#Autotrigger threadpool
autotrigger.threadpoolthreshold=10
manifest_version=2
## Product website
product_website=https://www.helicalinsight.com/