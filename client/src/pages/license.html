<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error Page</title>
    <style>
      .license-expired-page {
        background-color: #e2f2fb;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .error-message {
        font-size: 16px;
        font-weight: bold;
      }
      .renew-now-button {
        background-color: #1890ff;
        color: #ffffff;
        padding: 10px;
        margin: 10px;
      }
      .license-error {
        background-color: #f2dede;
        padding: 20px 50px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="license-expired-page">
      <p class="error-message">Oops!</p>
      <p>
        <img src="images/hi-license-expired/pencil.png" />
      </p>
      <p class="error-message">An error has occurred. Please see your system administrator</p>
      <a href="https://www.helicalinsight.com/contact-us/" target="_blank" class="renew-now-button">
        RENEW LICENSE
      </a>
      <p class="license-error">
        Your license file consists of invalid data or is expired. Please contact your system
        administrator
      </p>
    </div>
  </body>
</html>
