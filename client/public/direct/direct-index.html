    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/react/16.14.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/16.14.0/umd/react-dom.development.js"></script> -->
    <script>
        const elementId = 'direct';

        // function unMountRootComponent(elementId) {
        //     const rootElement = document.getElementById(elementId);
        //     if (rootElement) {
        //         ReactDOM.unmountComponentAtNode(rootElement);
        //     }
        // }

        function callAjax(urlString, token, callback) {
            $.ajax({
                method: "POST",
                url: urlString,
                contentType: "text/html",
                dataType: 'json',
                crossDomain: true,
                beforeSend: function (xhr, settings) {
                    if (token) {
                        // xhr.setRequestHeader("Authorization", token);
                        xhr.setRequestHeader("type", 'direct');
                        xhr.setRequestHeader("authToken", token);
                    }
                },
                success: function (data) {
                    callback(data)
                },
            })

        }


        function logout() {
            //delete cookies
            callAjax(requestBaseUrl + "/rest/jwtLogout.html", "", function () {
                document.getElementById('reports').innerHTML = '';
                document.getElementById('reports').style.display = "none"
                document.getElementById('direct').innerHTML = "";
                unMountRootComponent(elementId);
                authToken = ""

            })
        }

        var authToken = { username: "hiuser", password: "hiuser" };

        function getChildren(folder) {
            var items = []
            if (folder.children && folder.children.length) {
                folder.children.map(folder => {
                    items = items.concat(getChildren(folder))
                })
                return items
            }
            return folder
        }

        function openReportList() {
            unMountRootComponent(elementId);
            document.getElementById('direct').innerHTML = "";
            var formData = ["efw", "hr"]
            var options = {
                extensions: btoa(JSON.stringify(formData)),
                v: new Date().getTime()
            }
            var url = requestBaseUrl + "/getSolutionResources"
            url = url + "?extensions=" + options.extensions + "&v=" + options.v
            callAjax(url, authToken, function (data) {
                if (Array.isArray(data)) {
                    var items = []
                    data.map(folder => {
                        items = items.concat(getChildren(folder))
                    })
                    $("#reports")[0].innerHTML = ""
                    items.map(item => {
                        if (!item.title) {
                            return
                        }
                        var path = item.path
                        var name = item.name
                        var dir = item.path.replace(name, "").replace(/\/$/, "")
                        var div = document.createElement("div")
                        div.addEventListener("click", function () {
                            document.getElementById('reports').style.display = "none"
                            embed({
                                auth: { type: 'direct', authToken },
                                report: {
                                    dir, file: name,
                                },
                                elementId,
                                baseURL: requestBaseUrl
                            })
                            var reportCloser = document.createElement("div");
                            reportCloser.setAttribute("id", "report-closer");
                            reportCloser.addEventListener("click", function () {
                                document.getElementById('reports').style.display = "block";
                                document.getElementById('direct').innerHTML = "";
                                unMountRootComponent(elementId);
                            });
                            reportCloser.innerHTML = 'X';
                            $("#direct").append(reportCloser);
                            document.getElementById('report-closer').style.display = "block";
                        })
                        div.innerHTML = item.title
                        div.setAttribute("title", item.title + "(" + item.extension + ")")
                        div.setAttribute("class", "report-file")
                        $("#reports")[0].style.display = "block"
                        $("#reports").append(div)
                    })
                } else {
                    console.error('response is not an array')
                }
            })
        }

    </script>

    <div class="direct-header">
        <button id="open-btn" onclick="openReportList()">Reports</button>
        <!-- <button id="login-btn" onclick="logIn()">Login</button> -->
        <button id="logout-btn" onclick="logout()">Log Out</button>
    </div>
    <div class="reports-list">
        <div id="reports">
        </div>
    </div>
    <div style="width: 100%;  float: left" id="direct">
    </div>

    <style>
        #direct {
            position: relative;
        }

        #report-closer {
            font-size: 22px;
            color: red;
            font-weight: 800;
            cursor: pointer;
            position: absolute;
            top: -10px;
            z-index: 1;
            right: 2.5px;
        }

        .direct-header {
            float: right;
            padding: 5px 0px;
        }

        .direct-header button {
            border-width: 1px;
            border-color: #ccc;
            background-color: #3c8bca;
            color: #fff;
            padding: 4px;
            border-radius: 6px;
        }

        .direct-header button:hover {
            color: #3c8bca;
            background-color: #fff;
            border-color: #3c8bca;
        }

        .reports-list {
            position: relative;
        }

        .reports-list>div {
            width: 20%;
            display: none;
            position: absolute;
            right: 0px;
            top: 35px;
            height: 90vh;
            overflow: auto;
            border: 1px solid #ddd;
            background-color: #fff;
        }

        .report-file {
            cursor: pointer;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 2px;
            border-top: 1px solid #3c8bca;
        }

        .report-file:hover {
            background-color: #3c8bca;
            border-top: 1px solid #fff;
            color: #fff;
        }
    </style>

</body>

</html>
