# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build HelicalInsight

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: server/pom.xml
    - name: compile
      run: mvn -q clean compile --file server/pom.xml -Dedition=hice
      env:
        MAVEN_OPTS: -Xmx2g

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: server/pom.xml
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Verify Node
      run: |
        node --version
        npm --version
    
    - name: Prepare test environment
      run: bash scripts/setup-ci-test-env.sh
    
    - name: test
      run: mvn -q test --file server/pom.xml -Denv=ci -Dedition=hice
      env:
        MAVEN_OPTS: -Xmx2g
        
    - name: Generate coverage badge
      uses: cicirello/jacoco-badge-generator@v2
      with:
        jacoco-csv-file: server/presentation/target/site/jacoco-aggregate/jacoco.csv
        badges-directory: .github/badges
  
  frontend-tests:
    name: Frontend Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
  
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
  
      - name: Run unit tests
        run: npm test -- --ci
