[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --color=yes -p no:cacheprovider
markers =
    functional: marks a test as a functional/unit test (deselect with '-m "not functional"')
    integration: marks a test as an integration test (deselect with '-m "not integration"')
    llm: marks a test as an LLM prompt test evaluated with deepeval (deselect with '-m "not llm"')
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
